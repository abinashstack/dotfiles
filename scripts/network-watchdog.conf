#!/usr/bin/env bash
# Network Watchdog Configuration
# Sourced by network-watchdog.sh

# Preferred SSIDs in priority order (first available wins)
PREFERRED_SSIDS=("Airtel_Abinash" "SAP" "-SAP-" "SAP-Guest" "MyPhone")

# WiFi interface
WIFI_INTERFACE="en0"

# Thresholds
MAX_RECONNECT_ATTEMPTS=3
BACKOFF_FILE="/tmp/network-watchdog-backoff"
BACKOFF_DURATION=300  # seconds to wait after max failures

# GlobalProtect
GP_AUTO_RECONNECTS=true
GP_WAIT_AFTER_WIFI=15  # seconds to wait for GP after WiFi restores

# Logging
LOG_FILE="$HOME/Library/Logs/network-watchdog.log"
MAX_LOG_SIZE=5242880  # 5MB, rotate when exceeded

# Notifications
STATUS_FILE="/tmp/network-watchdog-status"
USE_MACOS_NOTIFICATION=true

# Starship config — colorful Catppuccin-inspired prompt

format = """
[](fg:#cba6f7)\
$os\
[](bg:#89b4fa fg:#cba6f7)\
$directory\
[](fg:#89b4fa bg:#a6e3a1)\
$git_branch\
$git_status\
[](fg:#a6e3a1 bg:#fab387)\
$nodejs\
$python\
$java\
$golang\
$rust\
$docker_context\
[](fg:#fab387 bg:#f38ba8)\
$time\
[ ](fg:#f38ba8)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#cba6f7 fg:#11111b"

[os.symbols]
Macos = " "
Linux = " "
Windows = "󰍲 "

[directory]
style = "bg:#89b4fa fg:#11111b bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"site" = "󰖟 "

[git_branch]
symbol = " "
style = "bg:#a6e3a1 fg:#11111b"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#a6e3a1 fg:#11111b"
format = "[$all_status$ahead_behind ]($style)"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted = "=${count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
deleted = "✘${count} "

[nodejs]
symbol = " "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol($version) ]($style)"

[python]
symbol = " "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol($version) ]($style)"

[java]
symbol = " "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol($version) ]($style)"

[golang]
symbol = " "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol($version) ]($style)"

[rust]
symbol = "󱘗 "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol($version) ]($style)"

[docker_context]
symbol = " "
style = "bg:#fab387 fg:#11111b"
format = "[ $symbol$context ]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#f38ba8 fg:#11111b"
format = "[  $time ]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
